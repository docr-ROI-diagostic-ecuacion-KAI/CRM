<form class="docroi-form-card">
  <h2>Ficha CRM Doc ROI Canal Estudiantes</h2>

  <label>Alias <input name="alias"></label>
  <label>Telefono <input name="telefono"></label>
  <label>Buyer Persona <input name="buyer_persona"></label>

</form>
